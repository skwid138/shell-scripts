name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: shellcheck + bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install shellcheck and shfmt (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # zsh is required by `make lint-strict` to validate .zsh files via
          # `zsh -n`; Ubuntu runners don't have it preinstalled. Without it,
          # lint-strict exits 3 ("zsh not installed") and masks downstream
          # test failures. macOS runners already ship zsh.
          sudo apt-get install -y shellcheck zsh
          # shfmt: install latest binary release directly (apt version often stale)
          SHFMT_VERSION="3.13.1"
          curl -fsSL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/v$SHFMT_VERSION/shfmt_v${SHFMT_VERSION}_linux_amd64"
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/shfmt
          shellcheck --version
          shfmt --version

      - name: Install shellcheck and shfmt (macOS)
        if: runner.os == 'macOS'
        run: |
          # macOS runners have brew preinstalled. shellcheck and shfmt are
          # both available as bottles, so this is fast.
          brew install shellcheck shfmt
          shellcheck --version
          shfmt --version

      - name: Lint (errors only)
        run: make lint-strict

      - name: Format check
        run: make fmt-check

      - name: Run tests
        run: make test

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # gitleaks needs full history to scan the diff and (if configured)
          # the historical commits. fetch-depth: 0 disables the default
          # shallow clone.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITHUB_TOKEN lets gitleaks-action post a check-run summary on PRs.
          # No org-level GITLEAKS_LICENSE is needed for public repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
